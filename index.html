    overflow: hidden;
  }

  }

  th {
    padding: 15px;
    color: #fff;
    font-weight: normal;
    text-align: left;
  }

  tbody {
    display: block;
  }

  tr {
    display: table;
    width: 100%;
    table-layout: fixed;
    cursor: pointer;
  }

  td {
    padding: 12px 15px;
    border-top: 1px solid #eee;
  }

  tr:hover {
    background-color: #f1f1f1;
  }

  .details {
    display: none;
    background: #f9f9f9;
  }

  .details td {
    padding: 10px 15px;
    border-top: 1px solid #ccc;

const tbody = document.getElementById('fleet-list');

fleet.forEach((bus) => {
  const row = document.createElement('tr');

  row.onclick = () => {
    const next = row.nextElementSibling;
    if (next && next.classList.contains('details')) {
      next.style.display = next.style.display === 'none' ? 'table-row' : 'none';
    }
  };

  const numberTd = document.createElement('td');
  numberTd.textContent = bus.number;

  const descTd = document.createElement('td');
  descTd.textContent = bus.description;

  const routeTd = document.createElement('td');
  routeTd.textContent = bus.route;

  row.appendChild(numberTd);
  row.appendChild(descTd);
  row.appendChild(routeTd);

  tbody.appendChild(row);

  const detailRow = document.createElement('tr');
  detailRow.className = 'details';
  detailRow.style.display = 'none';

  const detailTd = document.createElement('td');
  detailTd.colSpan = 3;

  const f = bus.features;
  detailTd.innerHTML = `
    <strong>Description:</strong> ${bus.description}<br/>
    <strong>Route:</strong> ${bus.route}<br/><br/>
    <strong>Features:</strong>
    <ul style="list-style: none; padding: 0;">
      <li>USB A ports: <span style="color: ${f.USB_A ? 'green' : 'red'};">${f.USB_A ? 'Yes' : 'No'}</span></li>
      <li>USB C ports: <span style="color: ${f.USB_C ? 'green' : 'red'};">${f.USB_C ? 'Yes' : 'No'}</span></li>
      <li>Power outlets: <span style="color: ${f.Power_Outlets ? 'green' : 'red'};">${f.Power_Outlets ? 'Yes' : 'No'}</span></li>
      <li>Handrails and grab handles: <span style="color: ${f.Handrails ? 'green' : 'red'};">${f.Handrails ? 'Yes' : 'No'}</span></li>
      <li>Digital route display: <span style="color: ${f.Route_Display ? 'green' : 'red'};">${f.Route_Display ? 'Yes' : 'No'}</span></li>
      <li>Emergency exits: <span style="color: ${f.Emergency_Exits ? 'green' : 'red'};">${f.Emergency_Exits ? 'Yes' : 'No'}</span></li>
      <li>CCTV cameras: <span style="color: ${f.CCTV ? 'green' : 'red'};">${f.CCTV ? 'Yes' : 'No'}</span></li>
      <li>Wi-Fi hotspot: <span style="color: ${f.WiFi ? 'green' : 'red'};">${f.WiFi ? 'Yes' : 'No'}</span></li>
      <li>Luggage racks: <span style="color: ${f.Luggage_Racks ? 'green' : 'red'};">${f.Luggage_Racks ? 'Yes' : 'No'}</span></li>
      <li>Seat belts: <span style="color: ${f.Seat_Belts ? 'green' : 'red'};">${f.Seat_Belts ? 'Yes' : 'No'}</span></li>
    </ul>
  `;
  detailRow.appendChild(detailTd);

});
