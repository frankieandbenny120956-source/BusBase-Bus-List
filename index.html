<style>
:root {
    --bg: linear-gradient(to bottom, #eef3f8, #dce7f2);
    --text: #222;
    --header: #003366;
    --nav: #00509e;
    --card: #ffffff;
    --muted: #666;
    --shadow: rgba(0,0,0,0.08);
    --detail: #f8fbff;
}
body.dark {
    --bg: linear-gradient(to bottom, #111827, #1f2937);
    --text: #f3f4f6;
    --header: #020617;
    --nav: #0f172a;
    --card: #1e293b;
    --muted: #cbd5e1;
    --shadow: rgba(0,0,0,0.35);
    --detail: #334155;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  margin: 0;
  padding: 0;
  color: var(--text);
}

header {
  background: var(--header);
  color: white;
  padding: 25px;
  text-align: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

header h1 {
  margin: 0;
  font-size: 2.2em;
}

header p {
  margin: 10px 0 0;
}

nav {
  background: var(--nav);
  text-align: center;
  padding: 12px;
}

nav a, nav button {
  color: white;
  text-decoration: none;
  margin: 0 15px;
  font-weight: bold;
  transition: 0.2s;
}

nav a:hover, nav button:hover {
  color: #cce5ff;
}

.fleet-container {
  max-width: 1100px;
  margin: 30px auto;
  padding: 20px;
}

.intro-card {
  background: var(--card);
  padding: 20px;
  margin-bottom: 25px;
  border-radius: 14px;
  box-shadow: 0 4px 15px var(--shadow);
}

.intro-card h2 {
  margin-top: 0;
  color: #003366;
}

.table-wrap {
  overflow-x: auto;
  border-radius: 14px;
  box-shadow: 0 4px 15px var(--shadow);
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--card);
  min-width: 700px;
}

th {
  background: var(--header);
  color: white;
  padding: 14px;
  text-align: left;
}

td {
  padding: 14px;
  border-bottom: 1px solid #ddd;
}

tbody tr:not(.details):hover {
  background: #eef6ff;
  cursor: pointer;
}

.details td {
  background: var(--detail);
  border-left: 6px solid #00509e;
}

.details ul {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 8px;
  margin-top: 10px;
}

.badge {
  display: inline-block;
  background: var(--nav);
  color: white;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 0.9em;
  font-weight: bold;
}

footer {
  text-align: center;
  padding: 20px;
  background: var(--header);
  color: white;
  margin-top: 40px;
}

@media (max-width: 700px) {
  header h1 {
    font-size: 1.7em;
  }

  nav a, nav button {
    display: inline-block;
    margin: 6px 8px;
  }

  .fleet-container {
    margin: 15px auto;
    padding: 12px;
  }
}


nav button, .dark-toggle {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
    transition: 0.2s;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
}

body.dark h2,
body.dark .intro-card h2,
body.dark .route-header h2 {
    color: #e5e7eb;
}

body.dark td {
    border-bottom-color: rgba(255,255,255,0.12);
}

body.dark tbody tr:not(.details):hover,
body.dark .route:hover,
body.dark .update-card:hover,
body.dark .update-entry:hover,
body.dark .stat-card:hover {
    background-color: rgba(255,255,255,0.04);
}

</style>
</head>

<script>
function toggleDarkMode() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('darkMode', isDark ? 'true' : 'false');

    const button = document.querySelector('.dark-toggle');
    if (button) {
        button.textContent = isDark ? 'Light Mode' : 'Dark Mode';
    }
}

function applySavedTheme() {
    const isDark = localStorage.getItem('darkMode') === 'true';
    document.body.classList.toggle('dark', isDark);

    const button = document.querySelector('.dark-toggle');
    if (button) {
        button.textContent = isDark ? 'Light Mode' : 'Dark Mode';
    }
}

applySavedTheme();
</script>
