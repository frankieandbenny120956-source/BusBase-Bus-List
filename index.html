    <td>${bus.description}</td>
    <td>${bus.route}</td>
  `;

  detailRow.className = 'details';
  detailRow.style.display = 'none';

  const f = bus.features || {};

  detailRow.innerHTML = `

      <strong>Route:</strong> ${bus.route}<br/><br/>

        <li>Seat belts: ${f.Seat_Belts ? 'Yes' : 'No'}</li>
      </ul>
    </td>
  `;

  row.addEventListener('click', () => {
