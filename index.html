<style>

:root {

  --muted:#cbd5e1;
  --header:#061a35;
  --nav:#073b82;
  --nav2:#05265a;
  --card:rgba(30,41,59,.78);
  --card-solid:#1e293b;
  --border:rgba(226,232,240,.35);
  --table-line:rgba(226,232,240,.14);
  --shadow:rgba(0,0,0,.38);
  --accent:#1d6fe9;
}
body.light {
  --bg: radial-gradient(circle at left 35%, rgba(148,163,184,.30), transparent 26%), linear-gradient(135deg,#edf5ff 0%,#dcecff 48%,#eef5ff 100%);
  --text:#07122b;
  --muted:#40516c;
  --header:#061a35;
  --nav:#073b82;
  --nav2:#05265a;
  --card:rgba(255,255,255,.88);
  --card-solid:#ffffff;
  --border:rgba(15,23,42,.16);
  --table-line:rgba(15,23,42,.13);
  --shadow:rgba(15,23,42,.16);
  --accent:#0969da;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.brand-header{background:linear-gradient(180deg,#061a35,#020817);padding:18px 16px 16px;text-align:center;box-shadow:0 10px 35px rgba(0,0,0,.35)}
.logo{width:190px;max-width:62vw;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 4px 10px rgba(0,0,0,.45));}
nav{background:linear-gradient(180deg,var(--nav),var(--nav2));display:flex;justify-content:center;align-items:center;gap:26px;padding:13px 16px;flex-wrap:wrap;box-shadow:0 8px 22px rgba(0,0,0,.22)}
nav a,nav button{color:#fff;text-decoration:none;font-weight:800;font-size:15px;background:none;border:0;cursor:pointer;font-family:inherit;padding:7px 0;position:relative;}
nav a.active::after{content:"";position:absolute;left:0;right:0;bottom:-13px;height:3px;background:#fff;border-radius:999px;}
.theme-toggle{background:rgba(2,8,23,.55)!important;border:1px solid rgba(255,255,255,.10)!important;border-radius:9px!important;padding:9px 17px!important;box-shadow:0 4px 12px rgba(0,0,0,.24)}
main{max-width:1160px;margin:0 auto;padding:46px 22px 50px;}
.page-title{text-align:center;margin-bottom:30px;}
.page-title h1{font-size:clamp(2rem,4vw,3.2rem);line-height:1.1;margin:0 0 12px;font-weight:900;letter-spacing:-.04em;}
.page-title p{margin:0;color:var(--muted);font-weight:700;font-size:1.05rem;}
.card,.intro-card,.update-card,.update-entry,.stat-card,.route{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:0 18px 45px var(--shadow);backdrop-filter:blur(12px);}
footer{background:rgba(2,8,23,.66);border-top:1px solid rgba(255,255,255,.08);color:#fff;text-align:center;font-weight:900;padding:21px;margin-top:18px;}
.badge,.tag{display:inline-block;border-radius:8px;background:#0b67db;color:#fff;font-weight:900;padding:6px 11px;font-size:.86rem}.new{background:#16a34a!important}.planned{background:#f59e0b!important}
@media(max-width:700px){.logo{width:145px}nav{gap:12px}nav a,nav button{font-size:13px}.theme-toggle{padding:7px 12px!important}main{padding:30px 14px}.page-title h1{font-size:2rem}}


.intro-card{padding:24px 26px;margin-bottom:24px}.intro-card h2{margin:0 0 8px;font-size:1.45rem}.intro-card p{margin:0;color:var(--muted);font-weight:600}.table-wrap{overflow-x:auto;border-radius:18px;box-shadow:0 18px 45px var(--shadow);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--card);min-width:720px}th{background:#05265a;color:white;text-align:left;padding:16px 20px;font-size:.95rem}td{padding:15px 20px;border-bottom:1px solid var(--table-line);font-weight:700}tbody tr:not(.details):hover{background:rgba(29,111,233,.13);cursor:pointer}.details td{background:rgba(15,23,42,.24);border-left:7px solid var(--accent);font-weight:500}.details ul{list-style:none;padding:0;margin:12px 0 0;display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:9px}.details li{padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border)}.chev{float:right;font-size:1.3rem;color:var(--muted)}
body.light .details td{background:#f3f8ff}body.light .details li{background:#fff}

  const isLight=document.body.classList.toggle('light');

}
function updateThemeButton(){
  const btn=document.querySelector('.theme-toggle');
  if(btn) btn.textContent=document.body.classList.contains('light')?'🌙 Dark Mode':'☀️ Light Mode';
}
(function(){
  if(localStorage.getItem('busbaseTheme')==='light') document.body.classList.add('light');
  updateThemeButton();
})();

fleet.forEach((bus) => {

    <td>${bus.description}</td>
    <td><span class="badge">${bus.route}</span></td>
    <td><span class="chev">›</span></td>
  `;

  const detailRow = document.createElement('tr');
  detailRow.className = 'details';
  detailRow.style.display = 'none';

  const f = bus.features || {};

  detailRow.innerHTML = `
    <td colspan="4">
      <strong>Description:</strong> ${bus.description}<br/>
      <strong>Route:</strong> ${bus.route}<br/><br/>

      <strong>Features:</strong>
      <ul style="list-style:none;padding:0;">
        <li>USB A: ${f.USB_A ? 'Yes' : 'No'}</li>
        <li>USB C: ${f.USB_C ? 'Yes' : 'No'}</li>
        <li>Power: ${f.Power_Outlets ? 'Yes' : 'No'}</li>
        <li>Handrails: ${f.Handrails ? 'Yes' : 'No'}</li>
        <li>Route display: ${f.Route_Display ? 'Yes' : 'No'}</li>
        <li>Emergency exits: ${f.Emergency_Exits ? 'Yes' : 'No'}</li>
        <li>CCTV: ${f.CCTV ? 'Yes' : 'No'}</li>
        <li>WiFi: ${f.WiFi ? 'Yes' : 'No'}</li>
        <li>Luggage racks: ${f.Luggage_Racks ? 'Yes' : 'No'}</li>
        <li>Seat belts: ${f.Seat_Belts ? 'Yes' : 'No'}</li>
      </ul>
    </td>
  `;

  row.addEventListener('click', () => {
    detailRow.style.display =
      detailRow.style.display === 'none' ? 'table-row' : 'none';
  });

  tbody.appendChild(row);
  tbody.appendChild(detailRow);
});
