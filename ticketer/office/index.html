<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticketer Office Control</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
    }

    header {
      background: #001e6e;
      padding: 16px;
      font-size: 22px;
      font-weight: bold;
    }

    .login, .security, .app {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
      background: #1f2937;
      border-radius: 12px;
    }

    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
    }

    button {
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button.red {
      background: #dc2626;
    }

    button.grey {
      background: #4b5563;
    }

    .message {
      background: #f8fafc;
      color: #111827;
      padding: 14px;
      border-radius: 10px;
      margin-top: 12px;
      border-left: 6px solid #2563eb;
    }

    .message.unread {
      border-left-color: #dc2626;
    }

    .meta {
      font-size: 13px;
      color: #475569;
    }

    .hidden {
      display: none;
    }

    .reply-box {
      margin-top: 10px;
      background: #e5e7eb;
      padding: 10px;
      border-radius: 8px;
    }

    .error {
      color: #fca5a5;
    }

    .success {
      color: #86efac;
    }
  </style>
</head>
<body>

<header>Ticketer Office Control Room</header>

<section class="login" id="loginBox">
  <h2>Office Login</h2>
  <p>Sign in with your office email and password.</p>
  <input id="email" type="email" placeholder="Office email" value="office@busbase.co.uk">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="loginError" class="error"></p>
</section>

<section class="security hidden" id="securityBox">
  <h2>Security Check</h2>
  <p>Enter your unique office number and password code.</p>
  <input id="staffId" placeholder="Unique number">
  <input id="securityCode" type="password" placeholder="Password code">
  <button onclick="verifySecurityCode()">Continue</button>
  <button class="grey" onclick="logout()">Cancel / Logout</button>
  <p id="securityError" class="error"></p>
</section>

<section class="app hidden" id="appBox">
  <h2>Live Driver Messages</h2>
  <p class="success" id="loggedInAs"></p>
  <button class="red" onclick="logout()">Logout</button>
  <div id="messages"></div>
</section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

  import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy,
    updateDoc,
    doc,
    getDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBBCqx9D1r5U9mWJYKEY_dtCdyk132xGog",
    authDomain: "busbase-ticketer-v2.firebaseapp.com",
    projectId: "busbase-ticketer-v2",
    storageBucket: "busbase-ticketer-v2.firebasestorage.app",
    messagingSenderId: "807388978236",
    appId: "1:807388978236:web:5ccf7c8193d81498377739"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let unsubscribeMessages = null;
  let verifiedOfficeUser = null;

  function showOnly(sectionId) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("securityBox").classList.add("hidden");
    document.getElementById("appBox").classList.add("hidden");

    if (sectionId) {
      document.getElementById(sectionId).classList.remove("hidden");
    }
  }

  window.login = async function () {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      document.getElementById("loginError").textContent = "";
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      document.getElementById("loginError").textContent = err.message;
    }
  };

  window.verifySecurityCode = async function () {
    const user = auth.currentUser;
    const staffId = document.getElementById("staffId").value.trim();
    const securityCode = document.getElementById("securityCode").value.trim();

    if (!user) {
      showOnly("loginBox");
      return;
    }

    if (!staffId || !securityCode) {
      document.getElementById("securityError").textContent = "Enter your unique number and password code.";
      return;
    }

    try {
      document.getElementById("securityError").textContent = "";

      const profileRef = doc(db, "officeUsers", user.uid);
      const profileSnap = await getDoc(profileRef);

      if (!profileSnap.exists()) {
        document.getElementById("securityError").textContent = "No office profile found for this account.";
        return;
      }

      const profile = profileSnap.data();

      if (profile.active !== true) {
        document.getElementById("securityError").textContent = "This office account is inactive.";
        return;
      }

      if (profile.role !== "office") {
        document.getElementById("securityError").textContent = "Access denied. This account is not an office user.";
        return;
      }

      if (String(profile.staffId) !== staffId || String(profile.code) !== securityCode) {
        document.getElementById("securityError").textContent = "Invalid unique number or password code.";
        return;
      }

      verifiedOfficeUser = {
        uid: user.uid,
        email: user.email,
        name: profile.name || "Office User",
        staffId: profile.staffId
      };

      document.getElementById("loggedInAs").textContent =
        "Logged in as " + verifiedOfficeUser.name + " (" + verifiedOfficeUser.staffId + ")";

      showOnly("appBox");
      startInbox();
    } catch (err) {
      document.getElementById("securityError").textContent = err.message;
    }
  };

  window.logout = async function () {
    if (unsubscribeMessages) {
      unsubscribeMessages();
      unsubscribeMessages = null;
    }

    verifiedOfficeUser = null;
    document.getElementById("password").value = "";
    document.getElementById("staffId").value = "";
    document.getElementById("securityCode").value = "";
    document.getElementById("messages").innerHTML = "";
    await signOut(auth);
  };

  onAuthStateChanged(auth, user => {
    if (user) {
      if (!verifiedOfficeUser) {
        showOnly("securityBox");
      }
    } else {
      verifiedOfficeUser = null;
      showOnly("loginBox");
    }
  });

  function startInbox() {
    if (unsubscribeMessages) {
      unsubscribeMessages();
      unsubscribeMessages = null;
    }

    const q = query(
      collection(db, "messages"),
      orderBy("createdAt", "desc")
    );

    unsubscribeMessages = onSnapshot(q, snapshot => {
      const box = document.getElementById("messages");
      box.innerHTML = "";

      snapshot.forEach(documentSnap => {
        const message = documentSnap.data();
        const messageId = documentSnap.id;

        const div = document.createElement("div");
        div.className = "message " + (message.status === "unread" ? "unread" : "");

        div.innerHTML = `
          <h3>${escapeHtml(message.subject || "No subject")}</h3>
          <p><strong>From:</strong> ${escapeHtml(message.from || "Driver")}</p>
          <p><strong>Driver ID:</strong> ${escapeHtml(message.driverId || "Unknown")}</p>
          <p><strong>Route:</strong> ${escapeHtml(message.route || "Unknown")}</p>
          <p>${escapeHtml(message.body || "")}</p>
          <p class="meta">Status: ${escapeHtml(message.status || "unknown")}</p>

          <div class="reply-box">
            <textarea id="reply-${messageId}" placeholder="Type reply to driver"></textarea>
            <button onclick="replyToDriver('${messageId}', '${escapeHtml(message.driverId || "1234")}')">
              Send Reply
            </button>
            <button onclick="markRead('${messageId}')">
              Mark Read
            </button>
          </div>
        `;

        box.appendChild(div);
      });
    }, err => {
      document.getElementById("messages").innerHTML =
        '<p class="error">Could not load messages: ' + escapeHtml(err.message) + '</p>';
    });
  }

  window.replyToDriver = async function (messageId, driverId) {
    if (!verifiedOfficeUser) {
      alert("You must complete the security check first.");
      return;
    }

    const textarea = document.getElementById("reply-" + messageId);
    const body = textarea.value.trim();

    if (!body) {
      alert("Type a reply first.");
      return;
    }

    await addDoc(collection(db, "replies"), {
      messageId,
      driverId,
      from: verifiedOfficeUser.name,
      officeUid: verifiedOfficeUser.uid,
      officeStaffId: verifiedOfficeUser.staffId,
      body,
      createdAt: serverTimestamp()
    });

    await updateDoc(doc(db, "messages", messageId), {
      status: "replied",
      repliedBy: verifiedOfficeUser.name,
      repliedAt: serverTimestamp()
    });

    textarea.value = "";
    alert("Reply sent.");
  };

  window.markRead = async function (messageId) {
    if (!verifiedOfficeUser) {
      alert("You must complete the security check first.");
      return;
    }

    await updateDoc(doc(db, "messages", messageId), {
      status: "read",
      readBy: verifiedOfficeUser.name,
      readAt: serverTimestamp()
    });
  };

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }
</script>

</body>
</html>
