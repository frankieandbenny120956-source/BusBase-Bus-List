<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photo Gallery with Upload</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f0f0f0;
    }
    h1 {
      margin-top: 20px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px;
    }
    .gallery img {
      max-width: 300px;
      margin: 10px;
      border: 2px solid #ccc;
      border-radius: 8px;
    }
    /* Style for upload form */
    #uploadForm {
      margin: 20px;
    }
  </style>
</head>
<body>
  <h1>Josh Hambling's Photography</h1>
  
  <!-- Upload form -->
  <form id="uploadForm">
    <input type="file" id="imageUpload" accept="image/*" />
    <button type="button" onclick="addImage()">Upload Image</button>
  </form>
  
  <!-- Gallery display -->
  <div class="gallery" id="gallery"></div>
  
  <script>
    // This script allows adding uploaded images to the gallery temporarily
    function addImage() {
      const input = document.getElementById('imageUpload');
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.createElement('img');
          img.src = e.target.result;
          document.getElementById('gallery').appendChild(img);
        }
        reader.readAsDataURL(file);
      } else {
        alert('Please select an image to upload.');
      }
    }
  </script>
</body>
</html>
