*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at 12% 8%,rgba(86,240,196,.18),transparent 28%),radial-gradient(circle at 92% 0%,rgba(91,140,255,.18),transparent 28%),linear-gradient(135deg,var(--bg),var(--bg-2));color:var(--text)}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(to bottom,black,transparent 82%);pointer-events:none}.app-shell{display:grid;grid-template-columns:292px minmax(0,1fr);min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;padding:24px;border-right:1px solid var(--line);background:rgba(8,11,18,.72);backdrop-filter:blur(24px);display:flex;flex-direction:column;gap:22px}body.light .sidebar{background:rgba(255,255,255,.68)}.brand{display:flex;align-items:center;gap:14px;padding:12px;border:1px solid var(--line);border-radius:24px;background:var(--surface)}.brand img{width:58px;height:58px;object-fit:contain}.brand-kicker{font-size:.76rem;font-weight:900;text-transform:uppercase;letter-spacing:.16em;color:var(--accent)}.brand-name{font-size:1.24rem;font-weight:950;letter-spacing:-.04em}.brand-sub{font-size:.82rem;color:var(--muted);font-weight:700;margin-top:2px}.nav{display:grid;gap:9px}.nav a,.theme-toggle{display:flex;align-items:center;gap:11px;width:100%;min-height:46px;padding:12px 14px;border-radius:16px;border:1px solid transparent;background:transparent;color:var(--muted);text-decoration:none;font:800 14px/1.1 inherit;cursor:pointer}.nav a:hover,.theme-toggle:hover{background:var(--surface);color:var(--text);border-color:var(--line)}.nav a.active{background:linear-gradient(135deg,rgba(86,240,196,.18),rgba(91,140,255,.16));color:var(--text);border-color:rgba(86,240,196,.35);box-shadow:0 10px 28px rgba(86,240,196,.08)}.nav a.active::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 18px var(--accent)}.sidebar-note{margin-top:auto;padding:16px;border:1px solid var(--line);border-radius:20px;background:var(--surface-3);color:var(--muted);font-size:.86rem;line-height:1.45;font-weight:700}.content{min-width:0;padding:32px}.hero,.page-title{position:relative;overflow:hidden;margin:0 0 24px;padding:34px;border:1px solid var(--line);border-radius:32px;background:linear-gradient(135deg,var(--surface-2),var(--surface));box-shadow:var(--shadow);backdrop-filter:blur(22px);text-align:left}.hero::after,.page-title::after{content:"";position:absolute;right:-70px;top:-80px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(86,240,196,.28),transparent 68%)}.page-title h1,.hero h1{position:relative;margin:0 0 10px;font-size:clamp(2.25rem,5vw,4.4rem);line-height:.95;letter-spacing:-.065em;font-weight:950}.page-title p,.hero p{position:relative;max-width:760px;margin:0;color:var(--muted);font-size:1.05rem;line-height:1.65;font-weight:700}.card,.intro-card,.update-card,.update-entry,.stat-card,.route,.departure-card,.info-card{background:linear-gradient(180deg,var(--surface),var(--surface-3));border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 18px 48px rgba(0,0,0,.18);backdrop-filter:blur(18px)}.intro-card{padding:24px;margin-bottom:22px}.intro-card h2,.info-card h2,.departure-card h2,.update-card h2{margin:0 0 9px;letter-spacing:-.03em}.intro-card p,.info-card p,.info-card li,.departure-card p,.update-card p,.update-entry p,.meta,.note,.updated{color:var(--muted);line-height:1.65;font-weight:650}.badge,.tag,.update-pill{display:inline-flex;align-items:center;border-radius:999px;background:linear-gradient(135deg,var(--accent-2),var(--accent-3));color:white;font-weight:950;padding:7px 12px;font-size:.78rem}.new{background:var(--good)!important}.planned{background:var(--warning)!important;color:#1f1300!important}.search,input.search{width:100%;padding:17px 19px;border-radius:18px;border:1px solid var(--line);background:var(--surface);color:var(--text);box-shadow:0 14px 36px rgba(0,0,0,.14);font-size:1rem;margin-bottom:22px;outline:none}.search:focus{border-color:rgba(86,240,196,.55);box-shadow:0 0 0 4px rgba(86,240,196,.12)}.search::placeholder{color:var(--muted)}.table-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line)}table{width:100%;border-collapse:collapse;background:var(--surface);min-width:720px}th{background:rgba(255,255,255,.09);color:var(--text);text-align:left;padding:17px 20px;font-size:.84rem;text-transform:uppercase;letter-spacing:.08em}td{padding:16px 20px;border-bottom:1px solid var(--line);font-weight:750}tbody tr:not(.details):hover{background:rgba(86,240,196,.08);cursor:pointer}.details td{background:rgba(86,240,196,.06);border-left:7px solid var(--accent);font-weight:550}.details ul{list-style:none;padding:0;margin:12px 0 0;display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:9px}.details li{padding:9px 11px;border-radius:14px;background:var(--surface-3);border:1px solid var(--line)}.chev,.route-arrow{color:var(--muted);font-size:1.4rem}.stats-grid,.departure-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;margin-bottom:32px}.stat-card{padding:22px;display:grid;grid-template-columns:58px 1fr;align-items:center;gap:16px}.stat-icon{width:58px;height:58px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(86,240,196,.16),rgba(91,140,255,.16));font-size:1.9rem}.stat-card h2{margin:0 0 4px;color:var(--muted);font-size:.88rem;text-transform:uppercase;letter-spacing:.08em}.stat-number{font-size:2.1rem;font-weight:950}.section-title{font-size:1.45rem;margin:0 0 14px;letter-spacing:-.03em}.departure-card{padding:24px}.departure-card a,.official-link{display:inline-flex;align-items:center;justify-content:center;margin-top:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#041018;text-decoration:none;padding:12px 16px;border-radius:14px;font-weight:950}.route{display:grid;grid-template-columns:96px 1fr 126px 32px;align-items:center;margin-bottom:14px;overflow:hidden}.route-date{height:100%;background:linear-gradient(180deg,rgba(86,240,196,.15),rgba(91,140,255,.12));border-left:7px solid var(--accent);display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:108px;font-weight:950}.route-date strong{font-size:1.9rem;line-height:1}.route-date span{font-size:.8rem;color:var(--muted);text-align:center}.route-header{padding:22px 18px}.route-header h2{margin:0 0 7px;font-size:1.25rem}.details{display:none;grid-column:1/-1;border-top:1px solid var(--line);padding:18px 22px;background:rgba(255,255,255,.035)}.open .details{display:block}.route-tag{text-align:center}.changes{max-width:900px}.update-card{display:grid;grid-template-columns:76px 1fr;gap:22px;align-items:start;padding:28px;margin-bottom:18px}.confirmed{border-left:7px solid var(--good)}.expected{border-left:7px solid var(--warning)}.icon-circle{width:58px;height:58px;border-radius:20px;display:grid;place-items:center;font-size:1.8rem;font-weight:950;background:var(--surface-3);border:1px solid var(--line)}.timeline{position:relative;max-width:860px}.timeline:before{content:"";position:absolute;left:36px;top:8px;bottom:8px;width:4px;background:linear-gradient(var(--accent),var(--accent-2));border-radius:999px}.update-entry{display:grid;grid-template-columns:86px 1fr 90px;gap:18px;align-items:center;margin-bottom:14px;padding:18px 18px 18px 100px;position:relative}.update-entry:before{content:"";position:absolute;left:27px;width:22px;height:22px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 7px rgba(86,240,196,.14)}.date{font-weight:950;text-align:center;line-height:1.05;color:var(--text)}.date strong{display:block;font-size:1.45rem}.status{justify-self:end}.info-card{padding:26px;margin-bottom:18px}.warning{border-left:7px solid var(--warning)}.contact{border-left:7px solid var(--accent-2)}.help{border-left:7px solid var(--good)}.info{border-left:7px solid var(--accent-3)}footer{margin-top:28px;color:var(--muted);font-weight:800;text-align:center;padding:20px}.footer-link{color:var(--accent);text-decoration:none}@media(max-width:980px){.app-shell{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.brand{max-width:520px}.content{padding:18px}.nav{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}.sidebar-note{display:none}}@media(max-width:720px){.page-title,.hero{padding:26px}.page-title h1,.hero h1{font-size:2.35rem}.route{grid-template-columns:76px 1fr 28px}.route-tag{grid-column:2;margin:0 18px 16px;text-align:left}.route-date{min-height:92px}.timeline:before,.update-entry:before{display:none}.update-entry{grid-template-columns:1fr;padding:20px}.date{text-align:left}.status{justify-self:start}.update-card{grid-template-columns:1fr}.content{padding:14px}.brand img{width:48px;height:48px}}
