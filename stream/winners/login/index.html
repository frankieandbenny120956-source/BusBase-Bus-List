<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Winners</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #151515;
    }

    .site-bg {
      background: #151515;
    }

    .page-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    .topbar {
      background: #222222;
      color: #f5f5f5;
      border: 1px solid #333333;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel,
    .dark-panel,
    .winner-card {
      background: #202020;
      color: #f4f4f4;
      border: 1px solid #333333;
      border-radius: 8px;
      padding: 16px;
      box-shadow: none;
    }

    .winner-card {
      border-left: 4px solid #d6a84f;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 9px 13px;
      font-weight: 700;
      background: #d6a84f;
      color: #151515;
      border: 1px solid #d6a84f;
      cursor: pointer;
      box-shadow: none;
    }

    .btn:hover {
      background: #e2b85f;
    }

    .btn-light {
      background: #2b2b2b;
      color: #f4f4f4;
      border: 1px solid #444444;
    }

    .btn-light:hover {
      background: #363636;
    }

    .btn-danger {
      background: #3a2424;
      color: #ffb4b4;
      border: 1px solid #623535;
    }

    .field {
      width: 100%;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 10px 11px;
      color: #f4f4f4;
      background: #151515;
      outline: none;
    }

    .field:focus {
      border-color: #d6a84f;
      box-shadow: 0 0 0 2px rgba(214, 168, 79, 0.25);
    }

    .label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 700;
      color: #cfcfcf;
    }

    .muted {
      color: #a3a3a3;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      background: #332917;
      color: #f2c46b;
      border: 1px solid #5a4722;
      font-size: 12px;
      font-weight: 700;
    }

    .status-box {
      background: #181818;
      border: 1px solid #303030;
      border-radius: 6px;
      padding: 10px;
    }

    .admin-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 360px 1fr;
    }

    @media (max-width: 900px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body class="site-bg text-white min-h-screen">
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      updateDoc,
      doc,
      onSnapshot,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBCqx9D1r5U9mWJYKEY_dtCdyk132xGog",
  authDomain: "busbase-ticketer-v2.firebaseapp.com",
  projectId: "busbase-ticketer-v2",
  storageBucket: "busbase-ticketer-v2.firebasestorage.app",
  messagingSenderId: "807388978236",
  appId: "1:807388978236:web:5ccf7c8193d81498377739"
    };

    const ADMIN_EMAILS = [
      "streamer@busbase.co.uk",
      "office@busbase.co.uk"
    ];


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const root = document.getElementById("app");

    let currentUser = null;
    let currentAdminName = "";
    let winners = [];
    let auditLogs = [];

    function escapeHTML(text = "") {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isAdmin(user) {
      return user && ADMIN_EMAILS.includes(user.email);
    }

    function getPinUser(email, pin) {
      return ADMIN_PIN_USERS.find(person => person.email === email && person.pin === pin) || null;
    }

    function pinIsCorrect(email, pin) {
      return Boolean(getPinUser(email, pin));
    }

    async function writeAuditLog(action, details) {
      await addDoc(collection(db, "auditLogs"), {
        action,
        details,
        adminEmail: currentUser ? currentUser.email : "unknown",
        adminName: currentAdminName || "Unknown admin",
        createdAt: serverTimestamp()
      });
    }

    function render() {
      const route = window.location.hash || "#/";
      if (route === "#/admin") {
        if (!isAdmin(currentUser)) renderLogin();
        else renderAdmin();
      } else {
        renderViewer();
      }
    }

    function renderViewer() {
      root.innerHTML = `
        <main class="page-shell">
          <header class="topbar">
            <div>
              <p class="mb-1 text-xs font-bold uppercase tracking-wide muted">Giveaway board</p>
              <h1 class="text-2xl font-bold">Stream Winners</h1>
              <p class="text-sm muted">Recent prizes, games, and winners</p>
            </div>
            <a href="#/admin" class="btn btn-light">Admin login</a>
          </header>

          <section class="mb-4 grid gap-3 sm:grid-cols-3">
            <div class="dark-panel">
              <p class="text-sm muted">Total winners</p>
              <p class="mt-1 text-4xl font-bold">${winners.length}</p>
            </div>
            <div class="dark-panel sm:col-span-2">
              <p class="pill">Auto updating</p>
              <h2 class="mt-3 text-xl font-bold">Prize history</h2>
              <p class="mt-1 muted">This page updates as soon as a winner is added.</p>
            </div>
          </section>

          <section id="winnerList" class="grid gap-3 md:grid-cols-2 xl:grid-cols-3"></section>
        </main>
      `;

      const list = document.getElementById("winnerList");
      if (!winners.length) {
        list.innerHTML = `<div class="dark-panel md:col-span-2 xl:col-span-3 text-center"><p class="text-2xl font-black">No winners yet</p><p class="mt-2 text-slate-300">The first prize will appear here once it is added.</p></div>`;
        return;
      }

      list.innerHTML = winners.map(winner => `
        <article class="winner-card">
          <div class="mb-4 flex items-start justify-between gap-3">
            <div>
              <p class="text-sm font-black text-slate-500">${escapeHTML(winner.date)}</p>
              <p class="text-sm muted">${escapeHTML(winner.streamTitle)}</p>
            </div>
            <span class="pill">Winner</span>
          </div>
          <h2 class="text-2xl font-bold">${escapeHTML(winner.winnerName)}</h2>
          <div class="mt-5 grid gap-3">
            <p class="status-box"><span class="block text-xs font-bold uppercase muted">Game</span>${escapeHTML(winner.gameName)}</p>
            <p class="status-box"><span class="block text-xs font-bold uppercase muted">Prize</span>${escapeHTML(winner.prize)}</p>
            <p class="status-box"><span class="block text-xs font-bold uppercase muted">Status</span>${escapeHTML(getStatusText(winner))}</p>
          </div>
        </article>
      `).join("");
    }

    function getStatusText(winner) {
      if (winner.status === "received") return "Received";
      if (winner.status === "retracted") return `Retracted${winner.statusReason ? ": " + winner.statusReason : ""}`;
      return "Pending";
    }

    async function updateWinnerStatus(winnerId, status) {
      try {
        const winner = winners.find(item => item.id === winnerId);
        if (!winner) {
          alert("Could not find this winner entry.");
          return;
        }

        let reason = "";
        if (status === "retracted") {
          reason = prompt("Why was this prize retracted?");
          if (!reason || !reason.trim()) {
            alert("You need to add a reason before retracting a prize.");
            return;
          }
          reason = reason.trim();
        }

        const statusData = {
          status,
          statusReason: reason,
          statusUpdatedBy: currentUser.email,
          statusUpdatedByName: currentAdminName || "Unknown admin",
          statusUpdatedAt: serverTimestamp()
        };

        await updateDoc(doc(db, "winners", winnerId), statusData);

        await writeAuditLog("update_prize_status", {
          message: "Prize status updated",
          winnerId,
          winnerName: winner.winnerName || "Unknown winner",
          prize: winner.prize || "Unknown prize",
          oldStatus: winner.status || "pending",
          newStatus: status,
          reason
        });

        alert("Status updated.");
      } catch (error) {
        console.error(error);
        alert("Status did not update. Check Firestore rules allow update on winners.");
      }
    }

    function renderLogin() {
      root.innerHTML = `
        <main class="page-shell">
          <header class="topbar">
            <div>
              <h1 class="text-2xl font-bold">Admin Login</h1>
              <p class="text-sm text-slate-300">Enter email, password, and PIN</p>
            </div>
            <a href="#/" class="btn btn-light">Viewer</a>
          </header>

          <div class="mx-auto max-w-md">
            <form id="loginForm" class="panel">
              <label class="mb-4 block">
                <span class="label">Email</span>
                <input id="email" type="email" required class="field" />
              </label>
              <label class="mb-4 block">
                <span class="label">Password</span>
                <input id="password" type="password" required class="field" />
              </label>
              <label class="mb-4 block">
                <span class="label">Admin PIN</span>
                <input id="pin" type="password" inputmode="numeric" required placeholder="Enter your PIN" class="field" />
              </label>
              <p id="loginError" class="mb-4 hidden rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700"></p>
              <button class="btn w-full">Login</button>
            </form>
          </div>
        </main>
      `;

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const pin = document.getElementById("pin").value.trim();
        const errorBox = document.getElementById("loginError");
        errorBox.classList.add("hidden");

        try {
          const result = await signInWithEmailAndPassword(auth, email, password);
          if (!ADMIN_EMAILS.includes(result.user.email) || !pinIsCorrect(result.user.email, pin)) {
            await signOut(auth);
            throw new Error("Not admin");
          }
          currentAdminName = getPinUser(result.user.email, pin).name;
          await writeAuditLog("login", {
            message: "Admin logged in"
          });
          window.location.hash = "#/admin";
        } catch {
          errorBox.textContent = "Login failed. Check the email, password, and PIN.";
          errorBox.classList.remove("hidden");
        }
      });
    }

    function renderAdmin() {
      root.innerHTML = `
        <main class="page-shell">
          <header class="topbar">
            <div>
              <h1 class="text-2xl font-bold">Winner Admin</h1>
              <p class="text-sm text-slate-300">Logged in as ${escapeHTML(currentUser.email)} · ${escapeHTML(currentAdminName || "Admin")}</p>
            </div>
            <div class="flex gap-2">
              <a href="#/" class="btn btn-light">Viewer</a>
              <button id="logoutBtn" class="btn btn-light">Logout</button>
            </div>
          </header>

          <div class="grid gap-4 lg:grid-cols-[380px_1fr]">
            <form id="winnerForm" class="panel">
              <h2 class="mb-4 text-xl font-bold">Add winner</h2>
              <label class="mb-3 block"><span class="label">Date</span><input id="date" type="date" required class="field" /></label>
              <label class="mb-3 block"><span class="label">Stream title</span><input id="streamTitle" required placeholder="Friday giveaway stream" class="field" /></label>
              <label class="mb-3 block"><span class="label">Game name</span><input id="gameName" required placeholder="Fortnite, Roblox, FIFA..." class="field" /></label>
              <label class="mb-3 block"><span class="label">Winner name</span><input id="winnerName" required placeholder="Winner username" class="field" /></label>
              <label class="mb-4 block"><span class="label">What they won</span><input id="prize" required placeholder="£10 gift card, Discord role, skin..." class="field" /></label>
              <button class="btn w-full">Save winner</button>
            </form>

            <section class="grid gap-4">
              <div class="panel">
                <h2 class="mb-4 text-xl font-bold">Recent entries</h2>
                <div id="adminList" class="space-y-3"></div>
              </div>

              <div class="panel">
                <h2 class="mb-4 text-xl font-bold">Admin activity log</h2>
                <div id="auditList" class="space-y-3"></div>
              </div>
            </section>
          </div>
        </main>
      `;

      document.getElementById("date").value = new Date().toISOString().slice(0, 10);
      document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

      document.getElementById("winnerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const winnerData = {
          date: document.getElementById("date").value,
          streamTitle: document.getElementById("streamTitle").value.trim(),
          gameName: document.getElementById("gameName").value.trim(),
          winnerName: document.getElementById("winnerName").value.trim(),
          prize: document.getElementById("prize").value.trim(),
          createdBy: currentUser.email,
          createdByName: currentAdminName || "Unknown admin",
          status: "pending",
          statusReason: "",
          statusUpdatedBy: "",
          statusUpdatedByName: "",
          statusUpdatedAt: null,
          createdAt: serverTimestamp()
        };

        await addDoc(collection(db, "winners"), winnerData);

        await writeAuditLog("add_winner", {
          message: "Winner added",
          date: winnerData.date,
          streamTitle: winnerData.streamTitle,
          gameName: winnerData.gameName,
          winnerName: winnerData.winnerName,
          prize: winnerData.prize
        });
        document.getElementById("gameName").value = "";
        document.getElementById("winnerName").value = "";
        document.getElementById("prize").value = "";
      });

      renderAdminList();
      renderAuditList();
    }

    function renderAuditList() {
      const list = document.getElementById("auditList");
      if (!list) return;

      if (!auditLogs.length) {
        list.innerHTML = `<div class="rounded-3xl bg-white p-6 text-slate-600">No admin actions logged yet.</div>`;
        return;
      }

      list.innerHTML = auditLogs.map(log => {
        const time = log.createdAt && log.createdAt.toDate ? log.createdAt.toDate().toLocaleString() : "Just now";
        return `
          <article class="rounded-3xl bg-white p-5 shadow-sm">
            <p class="text-sm font-semibold text-slate-500">${escapeHTML(time)}</p>
            <h3 class="mt-1 text-lg font-bold">${escapeHTML(log.action)}</h3>
            <p class="text-slate-700">By <strong>${escapeHTML(log.adminName)}</strong> (${escapeHTML(log.adminEmail)})</p>
            <pre class="mt-3 overflow-auto rounded-2xl bg-slate-100 p-3 text-xs text-slate-700">${escapeHTML(JSON.stringify(log.details || {}, null, 2))}</pre>
          </article>
        `;
      }).join("");
    }

    function renderAdminList() {
      const list = document.getElementById("adminList");
      if (!list) return;

      if (!winners.length) {
        list.innerHTML = `<div class="rounded-lg bg-slate-50 p-4 text-slate-600">No winners added yet.</div>`;
        return;
      }

      list.innerHTML = winners.map(winner => `
        <article class="rounded-lg border border-slate-200 bg-slate-50 p-4">
          <div class="flex items-start justify-between gap-3">
            <div>
              <p class="text-sm font-semibold text-slate-500">${escapeHTML(winner.date)} · ${escapeHTML(winner.streamTitle)}</p>
              <h3 class="mt-1 text-lg font-bold">${escapeHTML(winner.winnerName)}</h3>
              <p class="text-slate-700">Won <strong>${escapeHTML(winner.prize)}</strong> playing ${escapeHTML(winner.gameName)}</p>
              <p class="mt-2 text-sm font-bold text-slate-600">Status: ${escapeHTML(getStatusText(winner))}</p>
            </div>
            <div class="flex flex-wrap gap-2">
              <button type="button" data-status="received" data-id="${winner.id}" class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm font-bold text-emerald-700">Received</button>
              <button type="button" data-status="pending" data-id="${winner.id}" class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700">Pending</button>
              <button type="button" data-status="retracted" data-id="${winner.id}" class="rounded-lg border border-orange-200 bg-orange-50 px-3 py-2 text-sm font-bold text-orange-700">Retracted</button>
              <button type="button" data-delete="${winner.id}" class="rounded-lg border border-red-200 bg-white px-3 py-2 text-sm font-bold text-red-600">Delete</button>
            </div>
          </div>
        </article>
      `).join("");

      document.querySelectorAll("[data-status]").forEach(button => {
        button.addEventListener("click", async () => {
          await updateWinnerStatus(button.dataset.id, button.dataset.status);
        });
      });

      document.querySelectorAll("[data-delete]").forEach(button => {
        button.addEventListener("click", async () => {
          const winnerId = button.dataset.delete;
          const winner = winners.find(item => item.id === winnerId);

          await writeAuditLog("delete_winner", {
            message: "Winner deleted",
            deletedWinnerId: winnerId,
            deletedWinner: winner || null
          });

          await deleteDoc(doc(db, "winners", winnerId));
        });
      });
    }

    window.addEventListener("hashchange", render);

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      render();
    });

    const q = query(collection(db, "winners"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
      winners = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    });

    const auditQuery = query(collection(db, "auditLogs"), orderBy("createdAt", "desc"));
    onSnapshot(auditQuery, (snapshot) => {
      auditLogs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAuditList();
    });
  </script>
</body>
</html>
