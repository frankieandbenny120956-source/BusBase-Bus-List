<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lynx Bus Routes - Full Network</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
}

.search {
  width: 100%;
  padding: 10px;
  margin-bottom: 20px;
  font-size: 16px;
}

/* CARD */
.route {
  background: white;
  margin-bottom: 10px;
  border-left: 5px solid #ff6600;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
}

.route-header {
  padding: 15px;
}

.route-header h2 {
  margin: 0;
  font-size: 18px;
}

.meta {
  font-size: 14px;
  color: #555;
}

/* DROPDOWN */
.details {
  display: none;
  padding: 0 15px 15px 15px;
  background: #fafafa;
  border-top: 1px solid #eee;
}

.open .details {
  display: block;
}

/* TAG */
.tag {
  display: inline-block;
  padding: 3px 8px;
  background: #eee;
  border-radius: 4px;
  font-size: 12px;
  margin-top: 8px;
}

.new {
  background: #ff6600;
  color: white;
}

/* BACK BUTTON */
.back-btn {
  display: block;
  width: 100%;
  margin-top: 25px;
  padding: 14px;
  background: #d60000;
  color: white;
  text-align: center;
  font-size: 16px;
  border-radius: 6px;
  text-decoration: none;
}

.back-btn:hover {
  background: #b80000;
}
</style>
</head>

<body>

<h1>Lynx Bus Routes (Full Network)</h1>

<input class="search" id="search" placeholder="Search routes...">

<div id="routes"></div>

<a href="index.html">Back to Fleet List</a> |
<a href="upcoming.html">View Upcoming Changes</a>

function render(list){
const container=document.getElementById("routes");
container.innerHTML="";

list.forEach(r=>{
container.innerHTML+=`
<div class="route" onclick="this.classList.toggle('open')">
<div class="route-header">
<h2>Route ${r.number}</h2>
<div class="meta"><b>${r.from}</b> → <b>${r.to}</b></div>
<div class="tag ${r.tag.includes('NEW')?'new':''}">
${r.tag}
</div>
</div>

<div class="details">
<div class="meta"><b>Via:</b> ${r.via}</div>
<div class="meta"><b>Frequency:</b> ${r.frequency}</div>
<div class="meta" style="margin-top:8px;">${r.extra}</div>
</div>
</div>`;
});
}

document.getElementById("search").addEventListener("input",e=>{
const q=e.target.value.toLowerCase();
render(routes.filter(r=>
r.number.toLowerCase().includes(q)||
r.from.toLowerCase().includes(q)||
r.to.toLowerCase().includes(q)
));
});

render(routes);

</script>
