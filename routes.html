<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lynx Bus Routes</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
}

.search {
  width: 100%;
  padding: 10px;
  margin-bottom: 20px;
  font-size: 16px;
}

/* ROUTE CARD */
.route {
  background: white;
  margin-bottom: 10px;
  border-left: 5px solid #ff6600;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
}

.route-header {
  padding: 15px;
}

.route-header h2 {
  margin: 0;
  font-size: 18px;
}

.meta {
  font-size: 14px;
  color: #555;
}

/* DROPDOWN */
.details {
  display: none;
  padding: 0 15px 15px 15px;
  background: #fafafa;
  border-top: 1px solid #eee;
}

.open .details {
  display: block;
}

.tag {
  display: inline-block;
  padding: 3px 8px;
  background: #eee;
  border-radius: 4px;
  font-size: 12px;
  margin-top: 8px;
}

.new {
  background: #ff6600;
  color: white;
}

/* BACK BUTTON */
.back-btn {
  display: block;
  width: 100%;
  margin-top: 25px;
  padding: 14px;
  background: #d60000;
  color: white;
  text-align: center;
  font-size: 16px;
  border-radius: 6px;
  text-decoration: none;
}

.back-btn:hover {
  background: #b80000;
}
</style>
</head>

<body>

<h1>Lynx Bus Routes</h1>

<input class="search" id="search" placeholder="Search routes...">

<div id="routes"></div>

<!-- 🔴 BACK BUTTON -->
<a class="back-btn" href="https://frankieandbenny120956-source.github.io/BusBase-Bus-List/index.html">
  Back to Fleet List
</a>

<script>

const routes = [

  // ===== 33 FAMILY =====
  {
    number: "33",
    from: "King's Lynn",
    to: "Hunstanton",
    via: "QE Hospital • Hillington • Sedgeford",
    frequency: "Every 30–60 mins",
    tag: "Main",
    extra: "Main coastal trunk route between King's Lynn and Hunstanton."
  },

  {
    number: "33B",
    from: "Hunstanton",
    to: "Ringstead Loop",
    via: "Ringstead • Docking area villages",
    frequency: "Hourly (from 1 June)",
    tag: "NEW LOOP",
    extra: "Rural loop serving Ringstead and surrounding villages."
  },

  {
    number: "33C",
    from: "King's Lynn",
    to: "Hunstanton (Loop Service)",
    via: "QE Hospital • Bircham • Sedgeford circular",
    frequency: "Hourly (from 1 June)",
    tag: "NEW LOOP",
    extra: "New circular loop variant introduced 1st June."
  },

  // ===== COASTAL =====
  {
    number: "34",
    from: "King's Lynn",
    to: "Hunstanton",
    via: "Snettisham • Dersingham • Heacham",
    frequency: "Hourly",
    tag: "Coastal",
    extra: "Serves Snettisham and Dersingham villages."
  },

  {
    number: "35",
    from: "King's Lynn",
    to: "Hunstanton",
    via: "Sandringham • Heacham",
    frequency: "Hourly",
    tag: "Coastal",
    extra: "Main Sandringham corridor route."
  },

  {
    number: "36 Coastliner",
    from: "King's Lynn",
    to: "Fakenham",
    via: "Hunstanton • Wells-next-the-Sea",
    frequency: "Hourly",
    tag: "Express",
    extra: "Coastliner coastal express service."
  },

  // ===== TOWN =====
  {
    number: "41",
    from: "King's Lynn",
    to: "King's Reach",
    via: "Fairstead • QE Hospital",
    frequency: "Every 30–60 mins",
    tag: "Town",
    extra: "Urban estate service."
  },

  {
    number: "42",
    from: "King's Lynn",
    to: "Fairstead",
    via: "Gaywood",
    frequency: "Every 30–60 mins",
    tag: "Town",
    extra: "Local estate circular."
  },

  {
    number: "44",
    from: "King's Lynn",
    to: "King's Lynn Loop",
    via: "Gaywood • Fairstead • Hardwick • Town Centre",
    frequency: "Every 30 mins (from 1 June)",
    tag: "NEW LOOP",
    extra: "New circular town loop introduced 1st June."
  },

  // ===== RURAL / INTERURBAN =====
  {
    number: "37",
    from: "King's Lynn",
    to: "Downham Market",
    via: "West Winch • Southery",
    frequency: "Hourly–2 hourly",
    tag: "Rural",
    extra: "Key rural link service."
  },

  {
    number: "38",
    from: "King's Lynn",
    to: "Fair Green",
    via: "Hardwick • West Winch",
    frequency: "Hourly",
    tag: "Local",
    extra: "Short local connector."
  },

  {
    number: "39",
    from: "King's Lynn",
    to: "Marham",
    via: "Shouldham • RAF Marham",
    frequency: "Hourly–2 hourly",
    tag: "Rural",
    extra: "RAF Marham service."
  },

  {
    number: "46 / X46",
    from: "King's Lynn",
    to: "Wisbech",
    via: "Terrington • Walpole • St Germans",
    frequency: "Hourly",
    tag: "Interurban",
    extra: "Cross-county Fenland link."
  },

  {
    number: "48 / 49 / 49A",
    from: "King's Lynn",
    to: "Fakenham",
    via: "Gayton • Grimston • Great Massingham",
    frequency: "Hourly combined",
    tag: "Rural",
    extra: "Grouped rural corridor services."
  },

  {
    number: "60",
    from: "Wisbech",
    to: "Downham Market",
    via: "Outwell • Upwell • Three Holes",
    frequency: "Hourly–2 hourly",
    tag: "Cross-county",
    extra: "Fenland cross-county route."
  }

];

function render(list) {
  const container = document.getElementById("routes");
  container.innerHTML = "";

  list.forEach(r => {
    container.innerHTML += `
      <div class="route" onclick="this.classList.toggle('open')">
        <div class="route-header">
          <h2>Route ${r.number}</h2>
          <div class="meta"><b>${r.from}</b> → <b>${r.to}</b></div>
          <div class="tag ${r.tag.includes("NEW") ? "new" : ""}">
            ${r.tag}
          </div>
        </div>

        <div class="details">
          <div class="meta"><b>Via:</b> ${r.via}</div>
          <div class="meta"><b>Frequency:</b> ${r.frequency}</div>
          <div class="meta" style="margin-top:8px;">${r.extra}</div>
        </div>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  render(routes.filter(r =>
    r.number.toLowerCase().includes(q) ||
    r.from.toLowerCase().includes(q) ||
    r.to.toLowerCase().includes(q)
  ));
});

render(routes);

</script>

</body>
</html>
