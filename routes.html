<style>

:root {

  --nav:#073b82;
  --nav2:#05265a;

  --table-line:rgba(226,232,240,.14);
  --shadow:rgba(0,0,0,.38);

}
body.light {

*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.brand-header{background:linear-gradient(180deg,#061a35,#020817);padding:18px 16px 16px;text-align:center;box-shadow:0 10px 35px rgba(0,0,0,.35)}
.logo{width:190px;max-width:62vw;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 4px 10px rgba(0,0,0,.45));}
nav{background:linear-gradient(180deg,var(--nav),var(--nav2));display:flex;justify-content:center;align-items:center;gap:26px;padding:13px 16px;flex-wrap:wrap;box-shadow:0 8px 22px rgba(0,0,0,.22)}
nav a,nav button{color:#fff;text-decoration:none;font-weight:800;font-size:15px;background:none;border:0;cursor:pointer;font-family:inherit;padding:7px 0;position:relative;}
nav a.active::after{content:"";position:absolute;left:0;right:0;bottom:-13px;height:3px;background:#fff;border-radius:999px;}
.theme-toggle{background:rgba(2,8,23,.55)!important;border:1px solid rgba(255,255,255,.10)!important;border-radius:9px!important;padding:9px 17px!important;box-shadow:0 4px 12px rgba(0,0,0,.24)}
main{max-width:1160px;margin:0 auto;padding:46px 22px 50px;}
.page-title{text-align:center;margin-bottom:30px;}
.page-title h1{font-size:clamp(2rem,4vw,3.2rem);line-height:1.1;margin:0 0 12px;font-weight:900;letter-spacing:-.04em;}
.page-title p{margin:0;color:var(--muted);font-weight:700;font-size:1.05rem;}
.card,.intro-card,.update-card,.update-entry,.stat-card,.route{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:0 18px 45px var(--shadow);backdrop-filter:blur(12px);}
footer{background:rgba(2,8,23,.66);border-top:1px solid rgba(255,255,255,.08);color:#fff;text-align:center;font-weight:900;padding:21px;margin-top:18px;}
.badge,.tag{display:inline-block;border-radius:8px;background:#0b67db;color:#fff;font-weight:900;padding:6px 11px;font-size:.86rem}.new{background:#16a34a!important}.planned{background:#f59e0b!important}
@media(max-width:700px){.logo{width:145px}nav{gap:12px}nav a,nav button{font-size:13px}.theme-toggle{padding:7px 12px!important}main{padding:30px 14px}.page-title h1{font-size:2rem}}


.search{width:100%;padding:16px 18px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);box-shadow:0 14px 35px var(--shadow);font-size:1rem;margin-bottom:22px}.search::placeholder{color:var(--muted)}
.route{display:grid;grid-template-columns:92px 1fr 120px 30px;align-items:center;margin-bottom:14px;overflow:hidden}.route-date{height:100%;background:rgba(29,111,233,.16);border-left:8px solid var(--accent);display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:104px;font-weight:900}.route-date strong{font-size:1.85rem;line-height:1}.route-date span{font-size:.82rem;color:var(--muted);text-align:center}.route-header{padding:22px 18px}.route-header h2{margin:0 0 7px;font-size:1.25rem}.meta{color:var(--muted);font-weight:650;line-height:1.5}.details{display:none;grid-column:1/-1;border-top:1px solid var(--border);padding:18px 22px;background:rgba(15,23,42,.24)}.open .details{display:block}.route-arrow{font-size:1.8rem;color:var(--muted);font-weight:900}.route-tag{text-align:center}@media(max-width:760px){.route{grid-template-columns:76px 1fr 28px}.route-tag{grid-column:2;margin:0 18px 16px;text-align:left}.route-date{min-height:90px}}
body.light .details{background:#f3f8ff}

</style>

}

function routeDate(number){
  if(String(number).includes('44')) return ['44','May','2026'];
  if(String(number).includes('36')) return ['36','May','2026'];
  const n=String(number).split(' ')[0].replace(/[^0-9A-Z]/g,'');
  return [n,'May','2026'];
}
function render(list){
  const container=document.getElementById('routes');
  container.innerHTML='';
  list.forEach(r=>{
    const d=routeDate(r.number);
    container.innerHTML+=`
    <div class="route" onclick="this.classList.toggle('open')">
      <div class="route-date"><strong>${d[0]}</strong><span>${d[1]}<br>${d[2]}</span></div>
      <div class="route-header">
        <h2>${r.from} – ${r.to}</h2>
        <div class="meta"><b>Via</b> ${r.via}</div>
        <div class="meta"><b>${r.frequency}</b></div>
      </div>
      <div class="route-tag"><span class="tag ${r.tag.includes('NEW')?'new':''}">${r.tag}</span></div>
      <div class="route-arrow">›</div>
      <div class="details"><div class="meta">${r.extra}</div></div>
    </div>`;
  });
}
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  render(routes.filter(r=>r.number.toLowerCase().includes(q)||r.from.toLowerCase().includes(q)||r.to.toLowerCase().includes(q)||r.via.toLowerCase().includes(q)));
});
