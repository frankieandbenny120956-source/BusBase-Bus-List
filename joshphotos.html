<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Photo Gallery with Upload</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f0f0f0;
}

h1 {
  margin-top: 20px;
}

#uploadForm {
  margin: 20px;
}

button {
  padding: 10px 15px;
  cursor: pointer;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card img {
  width: 300px;
  border-radius: 8px;
}

.delete {
  margin-top: 8px;
  background: red;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<h1>Josh Hambling's Photography</h1>

<input type="file" id="imageUpload" accept="image/*">
<button onclick="uploadImage()">Upload Image</button>

<div class="gallery" id="gallery"></div>

<script>
const cloudName = "dlquvrodn";
const uploadPreset = "BusBase Photos";

let images = JSON.parse(localStorage.getItem("gallery")) || [];

renderGallery();

async function uploadImage() {
  const file = document.getElementById("imageUpload").files[0];

  if (!file) {
    alert("Please choose an image.");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    {
      method: "POST",
      body: formData
    }
  );

  const data = await res.json();

  if (data.secure_url) {
    images.push(data.secure_url);
    localStorage.setItem("gallery", JSON.stringify(images));

    addCard(data.secure_url);
    document.getElementById("imageUpload").value = "";
  } else {
    alert("Upload failed.");
  }
}

function renderGallery() {
  document.getElementById("gallery").innerHTML = "";
  images.forEach(url => addCard(url));
}

function addCard(url) {
  const card = document.createElement("div");
  card.className = "card";

  const img = document.createElement("img");
  img.src = url;

  const btn = document.createElement("button");
  btn.className = "delete";
  btn.textContent = "Delete";

  btn.onclick = () => {
    images = images.filter(i => i !== url);
    localStorage.setItem("gallery", JSON.stringify(images));
    renderGallery();
  };

  card.appendChild(img);
  card.appendChild(btn);

  document.getElementById("gallery").appendChild(card);
}
</script>

</body>
</html>
