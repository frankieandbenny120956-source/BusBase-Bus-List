<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shared Photo Gallery</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f0f0f0;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

img {
  width: 300px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>Shared Photo Gallery</h1>

<input type="file" id="file">
<button onclick="uploadImage()">Upload</button>

<div class="gallery" id="gallery"></div>

<script>
const cloudName = "dlquvrodn";
const uploadPreset = "galleryupload";
const tag = "busbase_gallery";

// Upload image
async function uploadImage() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select a file");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);
  formData.append("tags", tag);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    {
      method: "POST",
      body: formData
    }
  );

  const data = await res.json();

  if (data.secure_url) {
    loadImages();
  } else {
    alert("Upload failed");
  }
}

// Load ALL images from Cloudinary
async function loadImages() {
  const res = await fetch(
    `https://res.cloudinary.com/${cloudName}/image/list/${tag}.json`
  );

  const data = await res.json();

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  data.resources.forEach(img => {
    const card = document.createElement("div");
    card.className = "card";

    const image = document.createElement("img");
    image.src = img.secure_url;

    card.appendChild(image);
    gallery.appendChild(card);
  });
}

loadImages();
</script>

</body>
</html>>
