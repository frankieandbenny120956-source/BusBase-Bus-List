<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Gallery</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f0f0f0;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

img {
  width: 300px;
  border-radius: 8px;
}

button {
  margin-top: 5px;
  padding: 6px 10px;
}
</style>
</head>

<body>

<h1>Josh Hambling Photography</h1>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<div class="gallery" id="gallery"></div>

<script type="module">
import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// ✅ YOUR CORRECT VALUES
const supabaseUrl = "https://bhswvbdarzerwlfoykqh.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoc3d2YmRhcnplcndsZm95a3FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDQyMDAsImV4cCI6MjA5NTM4MDIwMH0.tu0DiUIYCZovBRhGSW1Wsu9FKl2m3BXck0_W343q5Pk";

const supabase = createClient(supabaseUrl, supabaseKey);

const bucket = "photos";

async function upload() {
  const file = document.getElementById("file").files[0];

  if (!file) return alert("Select a file");

  const fileName = Date.now() + "-" + file.name;

  const { error } = await supabase.storage
    .from(bucket)
    .upload(fileName, file);

  if (error) {
    alert("Upload failed: " + error.message);
    return;
  }

  loadImages();
}

async function loadImages() {
  const { data, error } = await supabase.storage
    .from(bucket)
    .list();

  if (error) {
    alert(error.message);
    return;
  }

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  for (const file of data) {
    const { data: urlData } = supabase.storage
      .from(bucket)
      .getPublicUrl(file.name);

    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = urlData.publicUrl;

    const btn = document.createElement("button");
    btn.textContent = "Delete (local only)";
    btn.onclick = () => card.remove();

    card.appendChild(img);
    card.appendChild(btn);

    gallery.appendChild(card);
  }
}

loadImages();
</script>

</body>
</html>
